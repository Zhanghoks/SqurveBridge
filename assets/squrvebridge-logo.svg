<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">SqurveBridge logo</title>
  <desc id="desc">A transparent vector logo connecting natural-language conversation, reproducible evaluation, and structured data through a bridge.</desc>

  <defs>
    <linearGradient id="seafoam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9BE9DD"/>
      <stop offset="1" stop-color="#48C9C8"/>
    </linearGradient>
    <linearGradient id="bridgeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7FE0D1"/>
      <stop offset="1" stop-color="#B5DDD2"/>
    </linearGradient>
  </defs>

  <!-- No background shape: the SVG canvas is fully transparent. -->
  <g stroke="#073F4C" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Natural-language input -->
    <path
      d="M116 267
         Q116 225 158 225
         H350
         Q392 225 392 267
         V410
         Q392 452 350 452
         H235
         L159 520
         L169 452
         H158
         Q116 452 116 410
         Z"
      fill="url(#seafoam)"
    />
    <g stroke-width="18">
      <path d="M177 294 H322"/>
      <path d="M177 343 H299"/>
      <path d="M177 392 H268"/>
    </g>

    <!-- Structured database / result terminal -->
    <rect x="842" y="257" width="245" height="286" rx="36" fill="#A8DDD2"/>
    <path d="M866 280 H1063 V348 H866 Z" fill="#48C9C8"/>
    <g fill="#D4E7DA" stroke-width="15">
      <rect x="871" y="382" width="76" height="55" rx="10"/>
      <rect x="976" y="382" width="76" height="55" rx="10"/>
      <rect x="871" y="462" width="76" height="55" rx="10"/>
      <rect x="976" y="462" width="76" height="55" rx="10"/>
    </g>

    <!-- Bridge: unified integration from language to data -->
    <path
      d="M354 519
         Q600 275 846 519
         L810 565
         Q600 366 390 565
         Z"
      fill="url(#bridgeFill)"
    />
    <g stroke-width="17">
      <path d="M430 459 V530"/>
      <path d="M500 400 V478"/>
      <path d="M570 369 V448"/>
      <path d="M640 369 V448"/>
      <path d="M710 400 V478"/>
      <path d="M780 459 V530"/>
    </g>

    <!-- Iterative, intelligent evolution -->
    <g fill="none" stroke-width="20">
      <path d="M541 281 A75 75 0 0 1 666 239"/>
      <path d="M666 239 L658 191 L699 223"/>
      <path d="M675 274 A75 75 0 0 1 550 316"/>
      <path d="M550 316 L558 364 L517 332"/>
    </g>
    <path
      d="M608 247
         L620 274
         L648 286
         L620 298
         L608 326
         L596 298
         L568 286
         L596 274
         Z"
      fill="#7FE0D1"
      stroke-width="12"
    />

    <!-- Reproducible pipeline: benchmark, method, metric, verification -->
    <g transform="translate(391 610)">
      <rect x="0" y="0" width="94" height="94" rx="18" fill="#A8DDD2"/>
      <g fill="#48C9C8" stroke-width="8">
        <rect x="20" y="20" width="18" height="18" rx="2"/>
        <rect x="55" y="20" width="18" height="18" rx="2"/>
        <rect x="20" y="55" width="18" height="18" rx="2"/>
        <rect x="55" y="55" width="18" height="18" rx="2"/>
      </g>
    </g>
    <g transform="translate(510 610)">
      <rect x="0" y="0" width="94" height="94" rx="18" fill="#A8DDD2"/>
      <g fill="#48C9C8" stroke="none">
        <circle cx="29" cy="29" r="9"/>
        <circle cx="65" cy="29" r="9"/>
        <circle cx="29" cy="65" r="9"/>
        <circle cx="65" cy="65" r="9"/>
      </g>
    </g>
    <g transform="translate(629 610)">
      <rect x="0" y="0" width="94" height="94" rx="18" fill="#A8DDD2"/>
      <g fill="#48C9C8" stroke="none">
        <rect x="20" y="54" width="13" height="22" rx="3"/>
        <rect x="41" y="39" width="13" height="37" rx="3"/>
        <rect x="62" y="21" width="13" height="55" rx="3"/>
      </g>
    </g>
    <g transform="translate(748 610)">
      <rect x="0" y="0" width="94" height="94" rx="18" fill="#A8DDD2"/>
      <path d="M23 49 L40 66 L72 29" fill="none" stroke="#48C9C8" stroke-width="15"/>
    </g>
  </g>

  <!-- Project name -->
  <text
    x="600"
    y="855"
    fill="#073F4C"
    text-anchor="middle"
    font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif"
    font-size="126"
    font-weight="750"
    letter-spacing="-5"
  >SqurveBridge</text>
</svg>
