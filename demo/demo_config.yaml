# Squrve Demo Configuration
# Demo-specific settings; Router/Engine use startup_config.json

# Paths (relative to project root). Prefer workspace/ for all runtime data.
paths:
  uploaded_db_root: "workspace/uploads/uploaded_db"
  temp_data_dir: "workspace/uploads/temp_demo_data"
  schema_source_dir: "workspace/uploads/schema_source"
  data_source_dir: "workspace/uploads/data_source"

# Router config path (for LLM, etc.)
router_config: "demo/startup_config.json"

# Server
server:
  name: "0.0.0.0"
  port: 7860
