name: Repository quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  contracts:
    name: Python ${{ matrix.python-version }} contracts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile first-party Python
        run: |
          python -m compileall -q core demo reproduce tools

      - name: Install tested runtime dependencies
        run: python -m pip install -r requirements.txt -r demo/requirements.txt

      - name: Run dependency-free regressions
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Scan public tree for anonymous-submission leaks
        run: python tools/anonymity_scan.py

      - name: Scan public tree for secrets
        run: python tools/security_scan.py

      - name: Validate benchmark manifest and LFS pointers
        run: python tools/benchmarks.py verify-pointers

      - name: Validate public reproduce configurations
        run: |
          python tools/verify.py reproduce-contract --path reproduce/configs/spider/c3sql.json
          python tools/verify.py reproduce-contract --path reproduce/configs/bird/e-sql-smoke.json

      - name: Validate release metadata and documentation links
        run: |
          python - <<'PY'
          from tools.release_check import validate_document_links, validate_release_metadata
          from pathlib import Path

          errors = validate_release_metadata(Path.cwd()) + validate_document_links(Path.cwd())
          if errors:
              raise SystemExit("\n".join(errors))
          PY

  package:
    name: Python ${{ matrix.python-version }} package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade build
          python -m build

  frontend:
    name: Demo workspace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build demo workspace
        run: npm run build

  pi-runtime:
    name: Embedded Pi runtime
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19"

      - name: Test the Pi bridge security contract
        run: node --test tests/pi_agent_bridge.test.mjs

      - name: Build the vendored Pi runtime
        run: bash demo/build_embedded_pi.sh

  hosted-space-image:
    name: Hugging Face Space image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify and install the packaged Spider benchmark
        run: |
          python tools/benchmarks.py verify-archives
          python tools/benchmarks.py install spider

      - name: Build the allowlisted Space context
        run: python tools/build_hf_space.py

      - name: Build the deployable Docker image
        run: docker build --tag squrvebridge-space:test build/hf-space

  deploy-hugging-face:
    name: Deploy Hugging Face Space
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - contracts
      - package
      - frontend
      - pi-runtime
      - hosted-space-image
      - history-security
    runs-on: ubuntu-latest
    concurrency:
      group: hugging-face-space-production
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the reviewed revision
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the Hugging Face CLI
        run: python -m pip install --upgrade "huggingface_hub>=1.19.0"

      - name: Build the allowlisted Space context
        run: python tools/build_hf_space.py

      - name: Publish the Space with a short-lived OIDC token
        env:
          HF_OIDC_RESOURCE: spaces/zmmjjkk/SqurveBridge
        run: |
          hf upload zmmjjkk/SqurveBridge build/hf-space . \
            --repo-type space \
            --delete "*" \
            --commit-message "Deploy GitHub ${GITHUB_SHA::7}"

  history-security:
    name: Reachable history security
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan history without printing matched values
        run: python tools/security_scan.py --history

  data-integrity:
    name: Full benchmark package integrity
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository and LFS payloads
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify archive checksums, structure, and safety
        run: python tools/benchmarks.py verify-archives
